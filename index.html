<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <!-- Google Fonts & Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Floating Background Glows (Light Theme) -->
    <div class="glow-bg top-[-10%] right-[-10%]"></div>
    <div class="glow-bg-2 bottom-[-10%] left-[-10%]"></div>

    <!-- Calculator Card (Light Theme) -->
    <div class="calc-container w-full max-w-[380px] p-6 rounded-[32px] flex flex-col gap-5">
        
        <!-- Header / Logo -->
        <div class="flex items-center justify-between px-2">
            <span class="text-xs font-semibold tracking-[0.25em] text-indigo-600 uppercase">Calculator</span>
            <div class="flex gap-1.5">
                <span class="w-2.5 h-2.5 rounded-full bg-red-400"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
            </div>
        </div>

        <!-- Display Screen -->
        <div class="display-screen rounded-2xl p-5 flex flex-col justify-end items-end min-h-[120px] overflow-hidden break-all">
            <!-- Expression/History (Secondary Line) -->
            <div id="history-display" class="text-sm font-medium text-slate-400 min-h-[0px] w-full text-right"></div>
            <!-- Main Output (Primary Line) -->
            <div id="main-display" class="text-4xl md:text-5xl font-semibold text-slate-800 tracking-tight mt-1 select-all w-full text-right">0</div>
        </div>

        <!-- Keypad Grid -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1: AC, Backspace, %, / -->
            <button onclick="clearAll()" class="btn-calc h-14 rounded-2xl bg-slate-100 hover:bg-slate-200 text-teal-600 font-bold text-lg">AC</button>
            <button onclick="deleteLast()" class="btn-calc h-14 rounded-2xl bg-slate-100 hover:bg-slate-200 text-teal-600 font-bold text-lg">
                <span class="flex items-center justify-center">⌫</span>
            </button>
            <button onclick="percent()" class="btn-calc h-14 rounded-2xl bg-slate-100 hover:bg-slate-200 text-teal-600 font-bold text-lg">%</button>
            <button onclick="chooseOperator('/')" class="btn-calc btn-operator h-14 rounded-2xl bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl">÷</button>

            <!-- Row 2: 7, 8, 9, * -->
            <button onclick="appendNumber('7')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">7</button>
            <button onclick="appendNumber('8')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">8</button>
            <button onclick="appendNumber('9')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">9</button>
            <button onclick="chooseOperator('*')" class="btn-calc btn-operator h-14 rounded-2xl bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl">×</button>

            <!-- Row 3: 4, 5, 6, - -->
            <button onclick="appendNumber('4')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">4</button>
            <button onclick="appendNumber('5')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">5</button>
            <button onclick="appendNumber('6')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">6</button>
            <button onclick="chooseOperator('-')" class="btn-calc btn-operator h-14 rounded-2xl bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl">−</button>

            <!-- Row 4: 1, 2, 3, + -->
            <button onclick="appendNumber('1')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">1</button>
            <button onclick="appendNumber('2')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">2</button>
            <button onclick="appendNumber('3')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">3</button>
            <button onclick="chooseOperator('+')" class="btn-calc btn-operator h-14 rounded-2xl bg-orange-500 hover:bg-orange-400 text-white font-bold text-xl">+</button>

            <!-- Row 5: +/-, 0, ., = -->
            <button onclick="toggleSign()" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-lg">+/-</button>
            <button onclick="appendNumber('0')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">0</button>
            <button onclick="appendNumber('.')" class="btn-calc h-14 rounded-2xl bg-white hover:bg-slate-50 text-slate-800 border border-slate-100/50 font-semibold text-xl">.</button>
            <button onclick="calculate()" class="btn-calc h-14 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-2xl">=</button>
        </div>
    </div>

    <!-- Scripting Logic -->
    <script>
        let tokens = ['0'];
        let isResultDisplay = false;
        let lastExpression = '';

        const mainDisplay = document.getElementById('main-display');
        const historyDisplay = document.getElementById('history-display');

        function isOperator(token) {
            return ['+', '-', '*', '/'].includes(token);
        }

        // Helper to check and reset calculation cycle state
        function checkCycleReset() {
            if (isResultDisplay) {
                isResultDisplay = false;
                lastExpression = '';
                historyDisplay.classList.remove('show-history');
                historyDisplay.innerText = '';
            }
        }

        function appendNumber(number) {
            if (isResultDisplay) {
                // Instantly clear result state and start a new number input
                tokens = [number];
                checkCycleReset();
            } else {
                let lastIdx = tokens.length - 1;
                let last = tokens[lastIdx];
                if (isOperator(last)) {
                    tokens.push(number);
                } else {
                    if (last === '0') {
                        if (number === '.') {
                            tokens[lastIdx] = '0.';
                        } else {
                            tokens[lastIdx] = number;
                        }
                    } else {
                        if (number === '.' && last.includes('.')) return;
                        tokens[lastIdx] = last + number;
                    }
                }
            }
            updateDisplay();
        }

        function chooseOperator(op) {
            if (isResultDisplay) {
                // If pressing an operator after a result, continue the calculation with the result
                const currentVal = tokens[0];
                checkCycleReset();
                tokens = [currentVal, op];
            } else {
                let lastIdx = tokens.length - 1;
                let last = tokens[lastIdx];
                if (isOperator(last)) {
                    tokens[lastIdx] = op;
                } else {
                    tokens.push(op);
                }
            }
            updateDisplay();
        }

        function evaluateExpression(tokensArray) {
            let list = [...tokensArray];
            if (isOperator(list[list.length - 1])) {
                list.pop();
            }
            if (list.length === 0) return 0;

            // Multiply and Divide pass
            for (let i = 0; i < list.length; i++) {
                if (list[i] === '*' || list[i] === '/') {
                    const op = list[i];
                    const prev = parseFloat(list[i-1]);
                    const next = parseFloat(list[i+1]);
                    if (isNaN(prev) || isNaN(next)) return 'Error';

                    let val;
                    if (op === '*') val = prev * next;
                    else {
                        if (next === 0) return 'Error';
                        val = prev / next;
                    }
                    list.splice(i - 1, 3, val);
                    i--;
                }
            }

            // Add and Subtract pass
            let result = parseFloat(list[0]);
            if (isNaN(result)) return 'Error';

            for (let i = 1; i < list.length; i += 2) {
                const op = list[i];
                const next = parseFloat(list[i+1]);
                if (isNaN(next)) break;
                if (op === '+') result += next;
                else if (op === '-') result -= next;
            }

            return Math.round(result * 1e8) / 1e8;
        }

        function calculate() {
            if (tokens.length === 0 || isResultDisplay) return;
            
            // Store the expression string before evaluating
            lastExpression = tokens.map(t => {
                if (isOperator(t)) return ` ${getOperatorSymbol(t)} `;
                return t;
            }).join('');
            
            const res = evaluateExpression(tokens);
            tokens = [res.toString()];
            isResultDisplay = true;
            updateDisplay();
        }

        function clearAll() {
            tokens = ['0'];
            isResultDisplay = false;
            lastExpression = '';
            historyDisplay.classList.remove('show-history');
            historyDisplay.innerText = '';
            updateDisplay();
        }

        function deleteLast() {
            if (isResultDisplay) {
                clearAll();
                return;
            }
            let lastIdx = tokens.length - 1;
            let last = tokens[lastIdx];
            if (isOperator(last)) {
                tokens.pop();
            } else {
                if (last.length <= 1) {
                    if (tokens.length === 1) {
                        tokens[0] = '0';
                    } else {
                        tokens.pop();
                    }
                } else {
                    tokens[lastIdx] = last.slice(0, -1);
                }
            }
            updateDisplay();
        }

        function toggleSign() {
            checkCycleReset();
            let lastIdx = tokens.length - 1;
            let last = tokens[lastIdx];
            if (isOperator(last)) return;
            if (last === '0' || last === 'Error') return;
            if (last.startsWith('-')) {
                tokens[lastIdx] = last.substring(1);
            } else {
                tokens[lastIdx] = '-' + last;
            }
            updateDisplay();
        }

        function percent() {
            checkCycleReset();
            let lastIdx = tokens.length - 1;
            let last = tokens[lastIdx];
            if (isOperator(last)) return;
            const val = parseFloat(last);
            if (!isNaN(val)) {
                tokens[lastIdx] = (val / 100).toString();
            }
            updateDisplay();
        }

        function getOperatorSymbol(op) {
            switch(op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return '';
            }
        }

        function updateDisplay() {
            if (isResultDisplay) {
                // Two-line layout: show full problem on secondary line, and final result on primary line
                historyDisplay.innerText = lastExpression;
                historyDisplay.classList.add('show-history');
                mainDisplay.innerText = tokens[0];
            } else {
                // Interactive State: show only single active input line (hide history display)
                historyDisplay.classList.remove('show-history');
                historyDisplay.innerText = '';

                // Render full expression on the main display during interactive input
                let exprString = tokens.map(t => {
                    if (isOperator(t)) return ` ${getOperatorSymbol(t)} `;
                    return t;
                }).join('');
                mainDisplay.innerText = exprString || '0';
            }
            
            // Auto scale font size if expression gets too long
            const len = mainDisplay.innerText.length;
            if (len > 12) {
                mainDisplay.className = "text-2xl font-semibold text-slate-800 tracking-tight mt-1 select-all w-full text-right transition-all duration-150";
            } else if (len > 8) {
                mainDisplay.className = "text-3xl font-semibold text-slate-800 tracking-tight mt-1 select-all w-full text-right transition-all duration-150";
            } else {
                mainDisplay.className = "text-4xl md:text-5xl font-semibold text-slate-800 tracking-tight mt-1 select-all w-full text-right transition-all duration-150";
            }
        }

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                appendNumber(e.key);
            } else if (e.key === '.') {
                appendNumber('.');
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                chooseOperator(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Backspace') {
                deleteLast();
            } else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') {
                clearAll();
            } else if (e.key === '%') {
                percent();
            }
        });
    </script>
</body>
</html>
